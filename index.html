<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andy Huchala</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: {
        inlineMath:  [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      },
      svg: { fontCache: "global" },
      startup: {
        ready() {
          MathJax.startup.defaultReady();
          MathJax.startup.promise.then(() =>
            window.dispatchEvent(new CustomEvent("mathjax-ready"))
          );
        }
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Global styles -->
  <link rel="stylesheet" href="/styles.css">
  <!-- Page-specific styles (all loaded upfront for instant transitions) -->
  <link rel="stylesheet" href="/gallery/styles.css">
  <link rel="stylesheet" href="/hodge/styles.css">
  <link rel="stylesheet" href="/oeis/styles.css">
  <link rel="stylesheet" href="/research/styles.css">
  <link rel="stylesheet" href="/teaching/styles.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/favicon/ms-icon-144x144.png">
</head>
<body>
  <div id="header"></div>

  <main id="app"></main>

  <div class="footer"></div>

  <div id="image-modal" class="modal" style="display:none">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img id="modal-image" src="" alt="">
      <div class="modal-text">
        <h2 id="modal-title"></h2>
        <p id="modal-description"></p>
      </div>
    </div>
  </div>

  <script type="module" src="/scripts/main.js"></script>
</body>
</html>

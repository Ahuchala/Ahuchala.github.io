<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <title>Andy Huchala</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // GH Pages serves this 404.html for any unknown path (e.g. /gallery).
    // We encode the path as a query param and redirect to the root so the
    // SPA's router can restore the correct page.
    var l = window.location
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    )
  </script>
</head>
<body></body>
</html>
